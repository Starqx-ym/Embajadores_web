<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Embajadores</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; color: #f8fafc;
        }
        .container {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; text-align: center;
        }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #334155; }
        .tab {
            flex: 1; padding: 10px; cursor: pointer; color: #94a3b8; font-weight: 600; transition: 0.3s;
        }
        .tab.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; margin-bottom: -2px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 8px;
            color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: #2563eb; }
        .hidden { display: none; }
        #message { margin-top: 15px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <div style="font-size: 40px; margin-bottom: 10px;">🎓</div>
        <h2 style="margin-bottom: 20px;">Portal de Embajadores</h2>
        
        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">Ingresar</div>
            <div class="tab" id="tabRegister" onclick="switchTab('register')">Registrarse</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Institucional</label>
                <input type="email" id="loginEmail" required placeholder="ejemplo@universidad.edu">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>

        <form id="registerForm" class="hidden">
            <div class="form-group">
                <label>Correo Institucional</label>
                <input type="email" id="regEmail" required placeholder="ejemplo@universidad.edu">
            </div>
            <div class="form-group">
                <label>Crear Contraseña</label>
                <input type="password" id="regPassword" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit" style="background: #10b981;">Crear Cuenta</button>
        </form>

        <div id="message"></div>
    </div>

    <div class="container hidden" id="dashboardBox" style="max-width: 500px;">
        <div style="font-size: 50px; margin-bottom: 15px;">🚧</div>
        <h2 style="color: #f59e0b; margin-bottom: 10px;">¡Acceso Autorizado!</h2>
        <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 20px;">
            Bienvenido al Portal de Embajadores Estudiantiles. Actualmente esta sección de la aplicación se encuentra en proceso de diseño y desarrollo arquitectónico para la siguiente entrega.
        </p>
        <div style="background: #0f172a; padding: 15px; border-radius: 8px; font-size: 13px; color: #64748b; border: 1px dashed #334155;">
            Control de Sesión Activo • Estado HTTP 200 OK
        </div>
    </div>

    <script>
        const messageDiv = document.getElementById('message');

        function switchTab(type) {
            messageDiv.innerText = '';
            if (type === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('loginForm').classList.add('hidden');
            }
        }

        // Evento de REGISTRO
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    messageDiv.style.color = '#10b981';
                    messageDiv.innerText = `✅ ¡Registro guardado! Ya puedes iniciar sesión.`;
                    switchTab('login');
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.innerText = `❌ ${data.error}`;
                }
            } catch (err) {
                messageDiv.innerText = '⚠️ Error de conexión.';
            }
        });

        // Evento de LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    // Ocultamos el login y mostramos la página en desarrollo
                    document.getElementById('authBox').classList.add('hidden');
                    document.getElementById('dashboardBox').classList.remove('hidden');
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.innerText = `❌ ${data.error}`;
                }
            } catch (err) {
                messageDiv.innerText = '⚠️ Error de conexión.';
            }
        });
    </script>
</body>
</html>
