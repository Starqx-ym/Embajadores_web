name: Embajadores CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ambassador-frontend/package-lock.json
            ambassador-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ambassador-backend
        run: npm ci

      - name: Build backend
        working-directory: ambassador-backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ambassador-frontend
        run: npm ci

      - name: Build frontend
        working-directory: ambassador-frontend
        run: npm run build

  deploy:
    name: Deploy to AWS VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            set -e
            cd ~/Embajadores_web
            cp ambassador-backend/.env /tmp/ambassador.env.backup || true
            git pull origin main
            cp /tmp/ambassador.env.backup ambassador-backend/.env || true
            cd ~/Embajadores_web/ambassador-frontend
            npm ci
            npm run build
            rm -rf ~/Embajadores_web/ambassador-backend/public/*
            cp -r dist/* ~/Embajadores_web/ambassador-backend/public/
            cd ~/Embajadores_web/ambassador-backend
            npm ci
            npm run build
            sudo systemctl restart ambassador
            sudo nginx -t
            sudo systemctl restart nginx
